$kind: http-request
name: Get My Access
method: GET
url: '{{baseUrl}}/users/me/access'
order: 900
description: Get current authenticated user's server-authoritative roles, active role, and onboarding flags
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.expect(pm.response.code).to.equal(200);
      });

      pm.test("Response time is under 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Response includes active access fields", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("object");
          pm.expect(jsonData.roles).to.be.an("array");
          pm.expect(jsonData.activeRole).to.be.a("string");
      });
