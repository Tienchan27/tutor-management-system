spring.application.name=tms
server.port=${SERVER_PORT:8081}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/tms_db}
spring.datasource.username=${DATABASE_USERNAME:tms_user}
spring.datasource.password=${DATABASE_PASSWORD:tms_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholders.default_admin_password_hash=${DEFAULT_ADMIN_PASSWORD_HASH}

# Error Handling
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:never}

# Application
app.timezone=Asia/Ho_Chi_Minh
app.security.jwt-secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=PT2S
app.redis.key-prefix=tms:

# Cache (Redis)
spring.cache.type=redis
spring.cache.redis.time-to-live=30s
spring.cache.redis.use-key-prefix=true

# Kafka (notifications pipeline)
app.kafka.enabled=${KAFKA_ENABLED:true}
app.kafka.topic.notifications=${KAFKA_NOTIFICATIONS_TOPIC:tms.notifications.v1}
app.kafka.topic.notifications-dlq=${KAFKA_NOTIFICATIONS_DLQ_TOPIC:tms.notifications.dlq.v1}
app.kafka.outbox.max-attempts=${KAFKA_OUTBOX_MAX_ATTEMPTS:5}
app.kafka.outbox.publisher.delay-ms=${KAFKA_OUTBOX_PUBLISHER_DELAY_MS:2000}

# Realtime (SSE + Kafka)
app.realtime.enabled=${REALTIME_ENABLED:true}
app.realtime.sse.heartbeat-ms=${REALTIME_SSE_HEARTBEAT_MS:30000}
app.realtime.sse.emitter-timeout-ms=${REALTIME_SSE_TIMEOUT_MS:3600000}
app.realtime.sse.max-connections-per-user=${REALTIME_SSE_MAX_CONNECTIONS_PER_USER:3}
app.realtime.sse.connect-limit-per-minute=${REALTIME_SSE_CONNECT_LIMIT_PER_MINUTE:20}
app.realtime.kafka.topic.events=${REALTIME_EVENTS_TOPIC:tms.realtime.events.v1}
app.realtime.kafka.topic.events-dlq=${REALTIME_EVENTS_DLQ_TOPIC:tms.realtime.events.dlq.v1}
app.realtime.outbox.max-attempts=${REALTIME_OUTBOX_MAX_ATTEMPTS:5}
app.realtime.outbox.publisher.delay-ms=${REALTIME_OUTBOX_PUBLISHER_DELAY_MS:1000}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

# Actuator
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.probes.enabled=true

# Mail
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
