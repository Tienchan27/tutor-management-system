spring.application.name=tms
server.port=${SERVER_PORT:8081}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/tms_db}
spring.datasource.username=${DATABASE_USERNAME:tms_user}
spring.datasource.password=${DATABASE_PASSWORD:tms_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Error Handling
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:never}

# Application
app.timezone=Asia/Ho_Chi_Minh
app.security.jwt-secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost}

# Actuator
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.probes.enabled=true

# Mail
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
