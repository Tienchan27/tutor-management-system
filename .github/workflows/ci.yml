name: CI Pipeline

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run backend tests
        run: chmod +x mvnw && ./mvnw -B -ntp clean verify

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" 
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run build
        run: npm run build
      - name: Run tests
        run: CI=true npm test -- --watchAll=false
    
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - run: docker build -t tms-backend:ci -f Dockerfile .
      - run: docker build -t tms-nginx:ci -f deploy/nginx/Dockerfile .
