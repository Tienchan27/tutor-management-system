name: CI Pipeline

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run backend tests
        run: chmod +x mvnw && ./mvnw -B -ntp clean verify

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run build
        run: npm run build
      - name: Run tests
        run: npm test

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare CI .env
        run: cp .env.ci .env

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for app healthy
        run: |
          set -e
          for i in $(seq 1 40); do
            status=$(docker compose ps --format json app 2>/dev/null | head -n1 || true)
            health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$(docker compose ps -q app)" 2>/dev/null || echo "missing")
            echo "attempt $i: app health=$health"
            if [ "$health" = "healthy" ]; then
              exit 0
            fi
            if [ "$health" = "unhealthy" ]; then
              docker compose logs app --tail=200
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for app health"
          docker compose ps
          docker compose logs --tail=200
          exit 1

      - name: Assert Flyway latest migration
        run: |
          set -e
          version=$(docker compose exec -T postgres-db \
            psql -U tms_user -d tms_db -tAc \
            "SELECT version FROM flyway_schema_history WHERE success ORDER BY installed_rank DESC LIMIT 1")
          echo "Latest Flyway version: $version"
          test "$version" = "7"

      - name: HTTP health via nginx
        run: curl -sf http://localhost/api/actuator/health

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=300

      - name: Tear down
        if: always()
        run: docker compose down -v
